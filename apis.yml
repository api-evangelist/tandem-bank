name: Tandem Bank
kind: company
description: >-
  Tandem Bank (Tandem Bank Limited) is a UK app-only challenger and self-styled
  "greener" digital bank founded in 2014 and headquartered in Blackpool, England,
  with offices in Cardiff, Durham, and London. It obtained its UK banking licence
  through the 2018 acquisition of Harrods Bank and has since grown by acquiring
  Allium Lending Group, Oplo, and Loop Money, offering savings and cash ISAs, green
  home-improvement and home loans, mortgages, motor finance, and a credit card.
  Tandem Bank Limited is authorised by the Prudential Regulation Authority and
  regulated by the Financial Conduct Authority. It is not one of the CMA9 and does
  not publish a public Open Data reference API; as an FCA-authorised ASPSP it meets
  UK Open Banking / PSD2 obligations through a dedicated interface provided by Token,
  conformant to the Open Banking Implementation Entity (OBIE) Read/Write Standard for
  Account and Transaction Information (AIS), Payment Initiation (PIS), and Confirmation
  of Funds (CBPII), secured with FAPI-grade OAuth2/OIDC, mutual-TLS, and PSD2 strong
  customer authentication. Tandem also consumes Open Banking as a TPP via TrueLayer
  for savings onboarding and transfers.
