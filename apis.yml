apis:
- aid: tandem-bank:tandem-bank-account-transaction-information-api
  name: Tandem Bank Account and Transaction Information API (AIS)
  description: >-
    Tandem Bank's Open Banking Account Information Service (AIS) exposing account,
    balance, transaction, and product data for its credit card and savings products.
    Delivered through Tandem's PSD2 dedicated interface (provided by Token), conformant
    to the OBIE Read/Write Account and Transaction API Standard. FAPI-secured
    (OAuth2/OIDC, mutual-TLS, PSD2 SCA); production base URL is issued per authorised
    TPP during Token onboarding and is not publicly published. The attached OpenAPI is
    the shared OBIE standard specification, not a Tandem-proprietary contract.
  humanURL: https://developer.token.io/
  tags:
  - Account Information
  - AISP
  - Open Banking
  properties:
  - type: OpenAPI
    url: openapi/obie-standard-account-info-openapi.yaml
  - type: Documentation
    url: https://developer.token.io/
  - type: APIReference
    url: https://github.com/OpenBankingUK/read-write-api-specs
- aid: tandem-bank:tandem-bank-payment-initiation-api
  name: Tandem Bank Payment Initiation API (PIS)
  description: >-
    Tandem Bank's Open Banking Payment Initiation Service (PIS) for initiating
    domestic and other payments against Tandem accounts. Delivered through Tandem's
    PSD2 dedicated interface (provided by Token), conformant to the OBIE Read/Write
    Payment Initiation API Standard. FAPI-secured (OAuth2/OIDC, mutual-TLS, PSD2 SCA);
    production base URL is issued per authorised TPP during Token onboarding and is not
    publicly published. The attached OpenAPI is the shared OBIE standard specification,
    not a Tandem-proprietary contract.
  humanURL: https://developer.token.io/
  tags:
  - Payment Initiation
  - PISP
  - Open Banking
  properties:
  - type: OpenAPI
    url: openapi/obie-standard-payment-initiation-openapi.yaml
  - type: Documentation
    url: https://developer.token.io/
  - type: APIReference
    url: https://github.com/OpenBankingUK/read-write-api-specs
- aid: tandem-bank:tandem-bank-confirmation-of-funds-api
  name: Tandem Bank Confirmation of Funds API (CBPII)
  description: >-
    Tandem Bank's Open Banking Confirmation of Funds Service (CBPII) allowing card-based
    payment instrument issuers to confirm the availability of funds. Delivered through
    Tandem's PSD2 dedicated interface (provided by Token), conformant to the OBIE
    Read/Write Confirmation of Funds API Standard. FAPI-secured (OAuth2/OIDC, mutual-TLS,
    PSD2 SCA); production base URL is issued per authorised TPP during Token onboarding
    and is not publicly published. The attached OpenAPI is the shared OBIE standard
    specification, not a Tandem-proprietary contract.
  humanURL: https://developer.token.io/
  tags:
  - Confirmation of Funds
  - CBPII
  - Open Banking
  properties:
  - type: OpenAPI
    url: openapi/obie-standard-confirmation-funds-openapi.yaml
  - type: Documentation
    url: https://developer.token.io/
  - type: APIReference
    url: https://github.com/OpenBankingUK/read-write-api-specs
