note: >-
  Scopes are the coarse-grained OAuth2 scopes defined by the OBIE Read/Write API
  Standard that Tandem Bank's Token-provided dedicated interface conforms to.
  A TPP's software statement must be permitted the relevant scope: "accounts"
  for the AIS/Account and Transaction API, "payments" for the PIS/Payment
  Initiation API, and "fundsconfirmations" for the CBPII/Confirmation of Funds
  API. Fine-grained permissions are expressed per-request through OBIE intents
  (account-access-consent, funds-confirmation-consent, and the payment-order
  consents) authorised by the PSU under PSD2 Strong Customer Authentication,
  not through additional OAuth scopes.
